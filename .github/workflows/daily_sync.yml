name: Daily Market Data Sync

on:
  schedule:
    # Weekdays at UTC 12:00 (IST 5:30 PM) — 2 hours after NSE market close
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      asset_type:
        description: 'Filter by asset type (EQUITY, INDEX, ETF, COMMODITY, FOREX). Leave empty for all.'
        required: false
        default: ''
      skip_discover:
        description: 'Skip asset discovery step'
        required: false
        type: boolean
        default: false
      skip_validate:
        description: 'Skip data validation step'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.12'
  UV_VERSION: '0.7'

jobs:
  sync:
    name: Sync Market Data
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5-hour max for large universes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Restore Data Cache
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-

      - name: Run sync pipeline
        env:
          HF_REPO_ID: ${{ vars.HF_REPO_ID || format('{0}/indian-market-historical-ohlcv', github.actor) }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_PRIVATE: ${{ vars.HF_PRIVATE || 'false' }}
          DATA_DIR: ./data
          LOG_LEVEL: INFO
          MAX_WORKERS: 4
          RATE_LIMIT_PER_SECOND: 2.0
          RETRY_ATTEMPTS: 3
          RETRY_WAIT_SECONDS: 5.0
          BATCH_COOLDOWN_SIZE: 50
          BATCH_COOLDOWN_SECS: 30.0
        run: |
          # Build the sync command
          CMD="market-data sync"

          # Add optional flags from workflow_dispatch inputs
          if [ "${{ github.event.inputs.asset_type }}" != "" ]; then
            CMD="$CMD --type ${{ github.event.inputs.asset_type }}"
          fi

          if [ "${{ github.event.inputs.skip_discover }}" = "true" ]; then
            CMD="$CMD --skip-discover"
          fi

          if [ "${{ github.event.inputs.skip_validate }}" = "true" ]; then
            CMD="$CMD --skip-validate"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Save Data Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: market-data-${{ runner.os }}-${{ github.run_id }}

      - name: Upload sync logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs-${{ github.run_number }}
          path: data/logs/
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          echo "## Market Data Sync Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

          if [ -f data/sync_status.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Sync Status" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/sync_status.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
